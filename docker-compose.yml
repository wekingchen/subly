# 生产部署：app + Caddy(自动 HTTPS)
# 内置 SQLite，零配置，无需任何外部数据库。
services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - app_data:/app/data        # SQLite 数据库文件 + 上传图标 + 内置图标库缓存持久化
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  app_data:
  caddy_data:
  caddy_config:
