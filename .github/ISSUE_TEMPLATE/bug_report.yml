name: 🐛 Bug Report
description: 报告一个 Bug
title: "[BUG] "
labels: ["bug"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        感谢报告 Bug！请尽可能详细地填写以下内容，以帮助我们快速解决问题。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 清晰地描述 Bug 是什么
      placeholder: "例如：当我点击续订按钮时，系统出现错误..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 描述如何复现这个问题
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 应该发生什么
      placeholder: "例如：订阅应该被成功续费..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么
      placeholder: "例如：显示错误消息或页面崩溃..."
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 错误日志（可选）
      description: 粘贴相关的错误信息或日志
      render: bash

  - type: textarea
    id: screenshots
    attributes:
      label: 截图（可选）
      description: 如果适用，添加截图帮助说明问题

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - Linux
        - macOS
        - Windows
        - 其他
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: 环境信息
      description: |
        例如：
        - Docker 版本
        - 浏览器版本
        - MySQL 版本
      placeholder: |
        Docker: 20.10
        浏览器: Chrome 120
        MySQL: 8.0
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: 其他信息
      description: 其他可能有用的信息

  - type: checkboxes
    id: checkboxes
    attributes:
      label: 检查清单
      options:
        - label: 我已搜索现有 Issues，确保这不是重复报告
          required: true
        - label: 我已按照安装指南正确部署
          required: true
