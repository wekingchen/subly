name: Build and Publish Docker image

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: 'Docker 镜像版本号，例如 1.0.0'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Reject manual releases outside main
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        run: |
          echo "Manual image releases must run from the main branch." >&2
          exit 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements-dev.txt

      - name: Run backend tests
        working-directory: backend
        run: python -m pytest

      - name: Lint backend application
        working-directory: backend
        run: python -m ruff check app

      - name: Audit Python dependencies
        continue-on-error: true
        run: python -m pip_audit -r backend/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Run frontend tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Audit frontend dependencies
        continue-on-error: true
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Validate Docker Compose files
        run: |
          cp .env.example .env
          docker compose -f docker-compose.yml config
          docker compose -f docker-compose.hub.yml config

  image-scan:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
          - platform: linux/arm64
            arch: arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.arch }} release artifact
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          tags: subly:ci-${{ matrix.arch }}
          outputs: type=docker,dest=/tmp/subly-${{ matrix.arch }}.tar
          cache-from: type=gha,scope=scan-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=scan-${{ matrix.arch }}

      - name: Generate ${{ matrix.arch }} Trivy SARIF report
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          input: /tmp/subly-${{ matrix.arch }}.tar
          format: sarif
          output: trivy-results-${{ matrix.arch }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload ${{ matrix.arch }} Trivy report
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results-${{ matrix.arch }}.sarif
          category: trivy-${{ matrix.arch }}

      - name: Enforce ${{ matrix.arch }} fixable high-severity vulnerability gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          input: /tmp/subly-${{ matrix.arch }}.tar
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload scanned ${{ matrix.arch }} release artifact
        uses: actions/upload-artifact@v7
        with:
          name: subly-image-${{ matrix.arch }}
          path: /tmp/subly-${{ matrix.arch }}.tar
          retention-days: 1
          if-no-files-found: error

  e2e:
    runs-on: ubuntu-latest
    needs: image-scan
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Download scanned amd64 image
        uses: actions/download-artifact@v4
        with:
          name: subly-image-amd64
          path: /tmp/subly-e2e

      - name: Load and start Subly image
        run: |
          docker load --input /tmp/subly-e2e/subly-amd64.tar
          docker run -d --name subly-e2e -p 8000:8000 \
            -e JWT_SECRET=e2e-jwt-secret-0123456789abcdef0123456789abcdef \
            -e ADMIN_USERNAME=e2e-admin \
            -e ADMIN_EMAIL=e2e-admin@example.com \
            -e ADMIN_PASSWORD=e2e-admin-password-123 \
            -e AUTH_COOKIE_SECURE=false \
            -e ALLOW_INSECURE_DEFAULTS=false \
            subly:ci-amd64

      - name: Wait for application health
        run: |
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:8000/api/health >/dev/null; then
              exit 0
            fi
            if ! docker inspect --format='{{.State.Running}}' subly-e2e | grep -q true; then
              docker logs subly-e2e
              exit 1
            fi
            sleep 2
          done
          docker logs subly-e2e
          exit 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke tests
        working-directory: frontend
        env:
          E2E_BASE_URL: http://127.0.0.1:8000
          E2E_ADMIN_USERNAME: e2e-admin
          E2E_ADMIN_PASSWORD: e2e-admin-password-123
        run: npm run e2e

      - name: Show application logs on failure
        if: failure()
        run: docker logs subly-e2e

      - name: Stop E2E container
        if: always()
        run: docker rm -f subly-e2e

  build-and-push:
    if: github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    needs: [verify, image-scan, e2e]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download scanned release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: subly-image-*
          path: /tmp/subly-images
          merge-multiple: true

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Docker version
        id: docker_meta
        shell: bash
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            VERSION="${VERSION_INPUT}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${VERSION}" ]]; then
            echo "Docker image version cannot be empty" >&2
            exit 1
          fi

          if ! [[ "${VERSION}" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$ ]]; then
            echo "Invalid Docker image version: ${VERSION}" >&2
            echo "Use letters, numbers, dots, underscores, or hyphens, and start with a letter or number." >&2
            exit 1
          fi

          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Push scanned images and publish multi-architecture manifests
        shell: bash
        env:
          DOCKERHUB_REPO: ${{ secrets.DOCKERHUB_USERNAME }}/subly
          GHCR_REPO: ghcr.io/${{ github.repository_owner }}/subly
          VERSION: ${{ steps.docker_meta.outputs.version }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          docker load --input /tmp/subly-images/subly-amd64.tar
          docker load --input /tmp/subly-images/subly-arm64.tar

          GHCR_REPO="$(printf '%s' "${GHCR_REPO}" | tr '[:upper:]' '[:lower:]')"
          for REPO in "${DOCKERHUB_REPO}" "${GHCR_REPO}"; do
            AMD64_REF="${REPO}:${SOURCE_SHA}-amd64"
            ARM64_REF="${REPO}:${SOURCE_SHA}-arm64"
            docker tag subly:ci-amd64 "${AMD64_REF}"
            docker tag subly:ci-arm64 "${ARM64_REF}"
            docker push "${AMD64_REF}"
            docker push "${ARM64_REF}"

            for TAG in latest "${VERSION}"; do
              TARGET="${REPO}:${TAG}"
              docker manifest rm "${TARGET}" >/dev/null 2>&1 || true
              docker manifest create "${TARGET}" "${AMD64_REF}" "${ARM64_REF}"
              docker manifest annotate "${TARGET}" "${AMD64_REF}" --os linux --arch amd64
              docker manifest annotate "${TARGET}" "${ARM64_REF}" --os linux --arch arm64
              docker manifest push --purge "${TARGET}"
            done
          done
