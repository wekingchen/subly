name: ✨ Feature Request
description: 建议一个新功能
title: "[FEATURE] "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        感谢提建议！请填写以下内容帮助我们理解你的想法。

  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 清晰地描述你建议的功能
      placeholder: "例如：添加导出订阅列表为 CSV 的功能..."
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: 使用场景
      description: 这个功能解决什么问题或提供什么帮助？
      placeholder: "例如：帮助用户备份订阅数据..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 建议的解决方案（可选）
      description: 你有想到如何实现吗？
      placeholder: "例如：在订阅管理页面添加导出按钮..."

  - type: textarea
    id: alternatives
    attributes:
      label: 其他可能的方案（可选）
      description: 有其他实现方式吗？
      placeholder: "例如：也可以通过 API 导出..."

  - type: textarea
    id: additional
    attributes:
      label: 其他信息（可选）
      description: 其他说明或上下文

  - type: checkboxes
    id: checkboxes
    attributes:
      label: 检查清单
      options:
        - label: 我已搜索现有 Issues，确保这个建议还没有被提出
          required: true
